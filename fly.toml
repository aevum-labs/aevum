app = "aevum-maintainer"
primary_region = "iad"

[build]

[env]
  PORT = "8080"
  AEVUM_DB_PATH = "/data/aevum_maintainer.db"

[[mounts]]
  source      = "aevum_maintainer_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
