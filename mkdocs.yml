site_name: Aevum
site_url: https://aevum.build
site_description: The governed context kernel for AI agents.
  Cryptographic audit trails, consent enforcement, and deterministic replay.
repo_url: https://github.com/aevum-labs/aevum
repo_name: aevum-labs/aevum
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_category_heading: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - attr_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aevum-labs/aevum
  version:
    provider: mike

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: getting-started/quickstart.md
    - Installation: getting-started/installation.md
    - MCP Setup: getting-started/mcp-setup.md
    - Windows Guide: getting-started/quickstart-windows.md
    - FAQ: getting-started/faq.md
  - Concepts:
    - How It Works: concepts/how-it-works.md
    - The Five Functions: concepts/five-functions.md
    - The Five Barriers: concepts/five-barriers.md
    - Consent Model: concepts/consent-model.md
    - The Sigchain: concepts/sigchain.md
  - Use Cases:
    - Billing Inquiry: use-cases/billing-inquiry.md
    - Enterprise Scenarios: use-cases/enterprise-scenarios.md
  - Domain Examples:
    - Overview: domain-examples/index.md
    - Healthcare (FHIR R4): domain-examples/healthcare.md
    - Finance (SOX): domain-examples/finance.md
    - Legal (GDPR): domain-examples/legal.md
  - Guides:
    - Is Aevum Right for You?: guides/fit-assessment.md
    - Guide by User Type: guides/non-enterprise.md
    - Building an Integration Layer: guides/integration-layer.md
    - Troubleshooting: guides/troubleshooting.md
  - Enterprise:
    - Evaluation Package: enterprise/overview.md
    - Security Architecture: enterprise/security-architecture.md
    - Security FAQ: enterprise/security-faq.md
    - Threat Model: enterprise/threat-model.md
    - Production Deployment: enterprise/deployment-guide.md
    - License Analysis: enterprise/license-analysis.md
  - Reference:
    - Engine: reference/engine.md
    - Output Envelope: reference/output-envelope.md
    - Consent Grants: reference/consent-grants.md
    - Audit Events: reference/audit-events.md
    - CLI: reference/cli.md
  - Changelog: changelog.md
  - Contributing: contributing.md
