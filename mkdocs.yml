site_name: Aevum
site_url: https://aevum.build
site_description: A Python library that gives AI agents a signed audit trail,
  consent-checked data access, and deterministic replay of past decisions.
repo_url: https://github.com/aevum-labs/aevum
repo_name: aevum-labs/aevum
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  custom_dir: docs/overrides
  font: false
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.footer
    - navigation.path
    - toc.follow
    - navigation.instant.prefetch
    - navigation.prune
    - content.tooltips

plugins:
  - search
  - social:
      enabled: !ENV [ENABLE_SOCIAL_CARDS, false]
      cards_layout_options:
        background_color: "#1a1a2e"
        color: "#ffffff"
  - privacy:
      assets_exclude:
        - unpkg.com/*
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/aevum-core/src
            - packages/aevum-mcp/src
            - packages/aevum-store-postgres/src
            - packages/aevum-store-oxigraph/src
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_category_heading: true
            members_order: source
  - redirects:
      redirect_maps:
        concepts/how-it-works.md: learn/architecture.md
        concepts/five-functions.md: learn/architecture.md
        concepts/five-barriers.md: learn/architecture.md
        concepts/consent-model.md: learn/architecture.md
        concepts/sigchain.md: learn/architecture.md
        enterprise/security-architecture.md: learn/security.md
        enterprise/security-faq.md: learn/security.md
        enterprise/threat-model.md: learn/security.md
        enterprise/deployment-guide.md: learn/deployment.md
        enterprise/license-analysis.md: learn/deployment.md
        enterprise/overview.md: learn/deployment.md
        getting-started/installation.md: learn/deployment.md
        getting-started/quickstart-windows.md: getting-started/quickstart.md
        guides/troubleshooting.md: guides/troubleshooting-faq.md
        guides/fit-assessment.md: index.md
        use-cases/enterprise-scenarios.md: index.md
        reference/engine.md: reference/api.md
        reference/output-envelope.md: reference/api.md
        reference/consent-grants.md: reference/api.md
        reference/audit-events.md: reference/api.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra:
  analytics:
    provider: google
    property: G-FHDQEMNCM2
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aevum-labs/aevum
      name: Aevum on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/aevum-core/
      name: aevum-core on PyPI

extra_css:
  - stylesheets/extra.css

