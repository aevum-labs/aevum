site_name: Aevum
site_url: https://aevum.build
site_description: The governed context kernel for AI agents.
  Cryptographic audit trails, consent enforcement, and deterministic replay.
repo_url: https://github.com/aevum-labs/aevum
repo_name: aevum-labs/aevum
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.png
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.footer
    - navigation.path
    - toc.follow
    - navigation.instant.prefetch
    - navigation.prune
    - content.tooltips

plugins:
  - search
  - privacy:
      assets_exclude:
        - unpkg.com/*
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_category_heading: true
            members_order: source
  - redirects:
      redirect_maps:
        'concepts/how-it-works.md': 'learn/architecture.md'
        'concepts/five-functions.md': 'learn/architecture.md'
        'concepts/five-barriers.md': 'learn/architecture.md'
        'concepts/consent-model.md': 'learn/architecture.md'
        'concepts/sigchain.md': 'learn/architecture.md'
        'enterprise/security-architecture.md': 'learn/security.md'
        'enterprise/security-faq.md': 'learn/security.md'
        'enterprise/threat-model.md': 'learn/security.md'
        'enterprise/deployment-guide.md': 'learn/deployment.md'
        'enterprise/license-analysis.md': 'learn/deployment.md'
        'enterprise/overview.md': 'learn/deployment.md'
        'getting-started/installation.md': 'learn/deployment.md'
        'getting-started/faq.md': 'guides/troubleshooting-faq.md'
        'getting-started/quickstart-windows.md': 'getting-started/quickstart.md'
        'guides/troubleshooting.md': 'guides/troubleshooting-faq.md'
        'product/what-is-aevum.md': 'index.md'
        'guides/fit-assessment.md': 'index.md'
        'use-cases/enterprise-scenarios.md': 'index.md'
        'guides/non-enterprise.md': 'index.md'
        'reference/engine.md': 'reference/api.md'
        'reference/output-envelope.md': 'reference/api.md'
        'reference/consent-grants.md': 'reference/api.md'
        'reference/audit-events.md': 'reference/api.md'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra:
  analytics:
    provider: google
    property: G-FHDQEMNCM2

nav:
  - Home: index.md
  - Learn:
    - Architecture: learn/architecture.md
    - Security: learn/security.md
    - Deployment: learn/deployment.md
    - Deployment Patterns: learn/deployment-patterns.md
    - Standards Alignment: learn/standards-alignment.md
    - Replay vs. Observability: concepts/replay-vs-observability.md
    - Audit Trails and Article 12: concepts/audit-trails.md
    - Memory Poisoning Defense: concepts/memory-poisoning.md
    - Tamper-Evident Logging: concepts/tamper-evident-logs.md
  - Build:
    - Quickstart: getting-started/quickstart.md
    - MCP Setup: getting-started/mcp-setup.md
    - Guides:
      - Integration Layer: guides/integration-layer.md
      - Billing Walkthrough: use-cases/billing-inquiry.md
      - MCP Audit Trail: guides/mcp-audit-trail.md
      - Troubleshooting and FAQ: guides/troubleshooting-faq.md
    - Domain Examples:
      - Overview: domain-examples/index.md
      - Healthcare (FHIR R4): domain-examples/healthcare.md
      - Finance (SOX): domain-examples/finance.md
      - Legal (GDPR): domain-examples/legal.md
  - Reference:
    - API: reference/api.md
    - CLI: reference/cli.md
    - Glossary: reference/glossary.md
    - Changelog: changelog.md
