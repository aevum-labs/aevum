site_name: Aevum
site_url: https://aevum.build
site_description: The governed context kernel for AI agents.
  Cryptographic audit trails, consent enforcement, and deterministic replay.
repo_url: https://github.com/aevum-labs/aevum
repo_name: aevum-labs/aevum
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_category_heading: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra:
  analytics:
    provider: google
    property: G-FHDQEMNCM2

nav:
  - Home: index.md
  - Product:
    - What is Aevum?: product/what-is-aevum.md
    - Is It Right for You?: guides/fit-assessment.md
    - Use Cases: use-cases/enterprise-scenarios.md
    - By User Type: guides/non-enterprise.md
  - Developers:
    - Getting Started:
      - Quickstart: getting-started/quickstart.md
      - Installation: getting-started/installation.md
      - MCP Setup: getting-started/mcp-setup.md
      - Windows Guide: getting-started/quickstart-windows.md
      - FAQ: getting-started/faq.md
    - Concepts:
      - How It Works: concepts/how-it-works.md
      - Five Functions: concepts/five-functions.md
      - Five Barriers: concepts/five-barriers.md
      - Consent Model: concepts/consent-model.md
      - The Sigchain: concepts/sigchain.md
      - Replay vs. Observability: concepts/replay-vs-observability.md
      - Audit Trails and Article 12: concepts/audit-trails.md
      - Memory Poisoning Defense: concepts/memory-poisoning.md
      - Tamper-Evident Logging: concepts/tamper-evident-logs.md
    - Guides:
      - Integration Layer: guides/integration-layer.md
      - Billing Walkthrough: use-cases/billing-inquiry.md
      - Troubleshooting: guides/troubleshooting.md
      - MCP Audit Trail: guides/mcp-audit-trail.md
    - Domain Examples:
      - Overview: domain-examples/index.md
      - Healthcare (FHIR R4): domain-examples/healthcare.md
      - Finance (SOX): domain-examples/finance.md
      - Legal (GDPR): domain-examples/legal.md
    - Reference:
      - Engine: reference/engine.md
      - Output Envelope: reference/output-envelope.md
      - Consent Grants: reference/consent-grants.md
      - Audit Events: reference/audit-events.md
      - CLI: reference/cli.md
  - Enterprise:
    - Evaluation Package: enterprise/overview.md
    - Security Architecture: enterprise/security-architecture.md
    - Security FAQ: enterprise/security-faq.md
    - Threat Model: enterprise/threat-model.md
    - Production Deployment: enterprise/deployment-guide.md
    - License Analysis: enterprise/license-analysis.md
  - Changelog: changelog.md
  - Contributing: contributing.md
