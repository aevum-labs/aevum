# SPDX-License-Identifier: Apache-2.0
[project]
name = "aevum-verify"
version = "0.8.0"
description = "Standalone independent verifier for Aevum sigchain entries and chains."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
keywords = ["ai", "governance", "audit", "verification", "sigchain", "post-quantum"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "cryptography>=42.0",
    "rfc8785>=0.1.2",
]

[project.optional-dependencies]
pqc = [
    "liboqs-python>=0.14.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.9",
    "ruff>=0.4",
    "aevum-core",
]

[project.scripts]
aevum-verify = "aevum.verify._cli:main"

[project.urls]
Homepage = "https://aevum.build"
Repository = "https://github.com/aevum-labs/aevum"

[tool.uv.sources]
aevum-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aevum"]

[tool.mypy]
mypy_path = "src"
strict = true
python_version = "3.11"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "oqs"
ignore_missing_imports = true
ignore_errors = true

[tool.ruff]
line-length = 130
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I", "ANN"]
ignore = ["ANN401"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--tb=short -m 'not integration'"
pythonpath = ["src"]
markers = [
    "integration: live network tests (run with: pytest -m integration)",
]
