[project]
name = "aevum-conformance"
version = "0.9.0"
description = "Aevum conformance test suite — 11 behavioral invariants."
requires-python = ">=3.11"
license = "Apache-2.0"
keywords = ["ai", "governance", "conformance", "audit"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Typing :: Typed",
]
dependencies = [
    "aevum-core>=0.9.0",
]

[project.optional-dependencies]
full = ["aevum-publish>=0.9.0"]   # enables invariant 10 (COSE receipt) in a full reference run

[project.urls]
Homepage = "https://aevum.build"
Repository = "https://github.com/aevum-labs/aevum"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aevum"]

[tool.uv.sources]
aevum-core = { workspace = true }
aevum-publish = { workspace = true }

[tool.mypy]
mypy_path = "src"
strict = true
python_version = "3.11"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "oqs"
ignore_missing_imports = true

[tool.ruff]
line-length = 130
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I", "ANN"]
ignore = ["ANN401"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--tb=short -m 'not integration'"
pythonpath = ["src", "tests"]
markers = [
    "integration: live network tests (run with: pytest -m integration)",
]
