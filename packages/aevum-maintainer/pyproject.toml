[project]
name = "aevum-maintainer"
version = "0.7.2"
description = "Aevum maintenance tooling: compliance pack generator and release utilities"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "aevum-core>=0.7.0",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "httpx>=0.25",
    "PyJWT[cryptography]>=2.13.0",
    "fastmcp>=3.2.0,<4",
    "slowapi>=0.1.9",
    "scalar-fastapi>=0.3.3",
]

[project.urls]
Homepage = "https://aevum.build"
Repository = "https://github.com/aevum-labs/aevum"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aevum_maintainer"]

[tool.uv.sources]
aevum-core = { workspace = true }
