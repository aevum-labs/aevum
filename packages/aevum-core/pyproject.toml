[project]
name = "aevum-core"
version = "0.8.0"
description = "Aevum — the sealed movement. Replay-first, policy-governed context kernel."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
keywords = ["ai", "governance", "provenance", "audit", "context", "replay"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0,<3.0",
    "cryptography>=42.0",
    "httpx>=0.27.0",
    "PyNaCl>=1.6.2",  # CVE-2025-69277 — key-recovery side-channel, fixed 1.6.2
    "rfc3161-client>=1.0.6",  # CVE-2026-33753 — TSA impersonation, fixed 1.0.6
    "pyyaml>=6.0",
    "base58>=2.1",
    "pyshacl>=0.25.0",
    "rdflib>=7.0.0",
    "oxrdflib>=0.4.0",
    "cbor2>=6.1.1",  # CVE-2026-26209 — max_depth added, depth-limit DoS fixed
    "rfc8785>=0.1.2",  # RFC 8785 JSON Canonicalization Scheme — true deterministic bytes for signing
]

[project.optional-dependencies]
cedar = ["cedarpy~=4.8.0"]
default = ["aevum-store-oxigraph"]
server = [
    "aevum-server>=0.7.0",
    # aevum-oidc added back in Phase 1 when OIDC package is restored
]
mcp = [
    "aevum-mcp>=0.7.0",
]
a2a = [
    "aevum-agent>=0.7.0",
]
oxigraph = [
    "aevum-store-oxigraph>=0.7.0",
]
postgres = [
    "aevum-store-postgres>=0.7.0",
]
langgraph = [
    "langgraph-checkpoint>=4.1.0",  # CVE-2025-64439 (7.4) RCE via JsonPlusSerializer — fixed 3.0, already satisfied
]
crewai = [
    "crewai>=0.80.0",
]
openai-agents = [
    "openai-agents>=0.0.12",
]
adk = [
    "google-adk>=2.2,<3",
]
maf = [
    "agent-framework-core>=1.0.0,<2",  # <2 cap prevents breaking API changes from 2.x
]
anthropic = [
    "anthropic>=0.50.0",
]
langchain = [
    "langchain-core>=1.2.22",  # CVE-2025-68664 (9.3) dumps() RCE, CVE-2026-34070 (7.5) path traversal — do not lower
]
benchmark = [
    "pytest-benchmark>=4.0.0",
]
pqc = [
    "liboqs-python>=0.14.0",  # Required for the hybrid default; absence fails closed (ADR-012).
]
all = [
    "aevum-core[cedar]",
    "aevum-core[server]",
    "aevum-core[mcp]",
    "aevum-core[a2a]",
    "aevum-core[oxigraph]",
    "aevum-core[postgres]",
    "aevum-core[pqc]",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.9",
    "ruff>=0.4",
    "cyclonedx-bom>=4.0",
    "types-PyYAML>=6.0",
    "inline-snapshot>=0.13",
    "dirty-equals>=0.7",
    "jsonschema>=4.23",  # P2k schema-regression guard — pinned for reproducible CI
]

[project.urls]
Homepage = "https://aevum.build"
Repository = "https://github.com/aevum-labs/aevum"
Issues = "https://github.com/aevum-labs/aevum/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aevum"]

[tool.uv.sources]
aevum-store-oxigraph = { workspace = true }
aevum-server = { workspace = true }
aevum-mcp = { workspace = true }
aevum-agent = { workspace = true }
aevum-store-postgres = { workspace = true }

[tool.mypy]
mypy_path = "src"
strict = true
python_version = "3.11"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "oqs"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "aevum.core.adapters.maf"
ignore_missing_imports = true

[tool.ruff]
line-length = 130
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I", "ANN"]
ignore = ["ANN401"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--tb=short -m 'not integration'"
pythonpath = ["src", "tests"]
markers = [
    "integration: live network tests (run with: pytest -m integration)",
]
