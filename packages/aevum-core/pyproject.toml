[project]
name = "aevum-core"
version = "0.3.0"
description = "Aevum — the sealed movement. Replay-first, policy-governed context kernel."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
license-files = ["../../LICENSE"]
keywords = ["ai", "governance", "provenance", "audit", "context", "replay"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0,<3.0",
    "cryptography>=42.0",
    "httpx>=0.27.0",
    "PyNaCl>=1.5.0",
    "liboqs-python>=0.10.0",
    "rfc3161-client>=1.0.0",
    "pyyaml>=6.0",
    "base58>=2.1",
    "cedarpy>=4.8.1",
]

[project.optional-dependencies]
default = ["aevum-store-oxigraph"]
server = [
    "aevum-server>=0.3.0",
    # aevum-oidc added back in Phase 1 when OIDC package is restored
]
mcp = [
    "aevum-mcp>=0.3.0",
]
a2a = [
    "aevum-agent>=0.3.0",
]
oxigraph = [
    "aevum-store-oxigraph>=0.3.0",
]
postgres = [
    "aevum-store-postgres>=0.3.0",
]
langgraph = [
    # populated in Phase 7
]
crewai = [
    # populated in Phase 7
]
openai-agents = [
    # populated in Phase 7
]
all = [
    "aevum-core[server]",
    "aevum-core[mcp]",
    "aevum-core[a2a]",
    "aevum-core[oxigraph]",
    "aevum-core[postgres]",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.9",
    "ruff>=0.4",
    "cyclonedx-bom>=4.0",
    "types-PyYAML>=6.0",
]

[project.urls]
Homepage = "https://aevum.build"
Repository = "https://github.com/aevum-labs/aevum"
Issues = "https://github.com/aevum-labs/aevum/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aevum"]

[tool.uv.sources]
aevum-store-oxigraph = { workspace = true }
aevum-server = { workspace = true }
aevum-mcp = { workspace = true }
aevum-agent = { workspace = true }
aevum-store-postgres = { workspace = true }

[tool.mypy]
mypy_path = "src"
strict = true
python_version = "3.11"
ignore_missing_imports = true

[tool.ruff]
line-length = 130
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I", "ANN"]
ignore = ["ANN401"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--tb=short -m 'not integration'"
pythonpath = ["src", "tests"]
markers = [
    "integration: live network tests (run with: pytest -m integration)",
]
