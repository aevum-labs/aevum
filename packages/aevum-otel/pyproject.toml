[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aevum-otel"
version = "0.9.0"
description = "Aevum — OpenTelemetry bridge complication. Routes sigchain events to OTel GenAI spans."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
keywords = ["aevum", "opentelemetry", "otel", "observability", "genai", "audit"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "aevum-core>=0.9.0",
    "opentelemetry-sdk>=1.27.0",
    "opentelemetry-api>=1.27.0",
]

[project.optional-dependencies]
otlp = [
    "opentelemetry-exporter-otlp-proto-grpc>=1.27.0",
]
otlp-http = [
    "opentelemetry-exporter-otlp-proto-http>=1.27.0",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "mypy>=1.9",
    "ruff>=0.4",
]

[project.urls]
Homepage = "https://aevum.build"
Repository = "https://github.com/aevum-labs/aevum"
Issues = "https://github.com/aevum-labs/aevum/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aevum"]
artifacts = ["src/aevum/otel/py.typed"]

[tool.uv.sources]
aevum-core = { workspace = true }

[tool.mypy]
mypy_path = "src"
strict = true
python_version = "3.11"
ignore_missing_imports = true

[tool.ruff]
line-length = 130
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I", "ANN"]
ignore = ["ANN401"]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "--tb=short"
pythonpath = ["src", "tests"]
