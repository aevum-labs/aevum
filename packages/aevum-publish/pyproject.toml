[project]
name = "aevum-publish"
version = "0.1.0"
description = "Aevum — Sigstore Rekor v2 transparency log complication."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Typing :: Typed",
]
dependencies = [
    "aevum-core",
]

[project.optional-dependencies]
rekor = ["httpx>=0.27.0"]
dev = [
    "pytest>=8.0",
    "mypy>=1.10",
    "ruff>=0.9",
    "httpx>=0.27.0",
]

[project.entry-points."aevum.complications"]
publish = "aevum.publish.complication:PublishComplication"

[project.urls]
Homepage = "https://aevum.build"
Repository = "https://github.com/aevum-labs/aevum"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aevum"]

[tool.uv.sources]
aevum-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short"
pythonpath = ["src", "../../packages/aevum-core/src"]

[tool.mypy]
strict = true
python_version = "3.11"
mypy_path = "src"
explicit_package_bases = true
ignore_missing_imports = true

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I", "ANN"]
ignore = ["ANN401"]
