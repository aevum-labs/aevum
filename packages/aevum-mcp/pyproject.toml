[project]
name = "aevum-mcp"
version = "0.0.1"
description = "Aevum — MCP server complication."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
dependencies = [
    "aevum-core",
    "aevum-sdk",
]

[project.urls]
Homepage = "https://aevum.dev"
Repository = "https://github.com/aevum-labs/aevum"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aevum"]

[tool.uv.sources]
aevum-core = { workspace = true }
aevum-sdk = { workspace = true }
