[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aevum-agent"
version = "0.7.2"
description = "Aevum — A2A v1.0 agent protocol interceptor and governance layer."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
keywords = ["aevum", "agents", "a2a", "governance", "audit"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "aevum-core>=0.7.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "mypy>=1.9",
    "ruff>=0.4",
]

[project.urls]
Homepage = "https://aevum.build"
Repository = "https://github.com/aevum-labs/aevum"
Issues = "https://github.com/aevum-labs/aevum/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aevum"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short"
pythonpath = ["src", "tests"]

[tool.mypy]
strict = true
python_version = "3.11"
mypy_path = "src"
explicit_package_bases = true
ignore_missing_imports = true

[tool.ruff]
line-length = 130

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I", "ANN"]
ignore = ["ANN401"]

[tool.uv.sources]
aevum-core = { workspace = true }
