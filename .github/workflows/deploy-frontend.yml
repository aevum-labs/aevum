name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo/src/**'
      - 'demo/index.html'
      - 'demo/package.json'
      - 'demo/vite.config.ts'
      - 'demo/tsconfig*.json'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: demo/package-lock.json

      - name: Install dependencies
        working-directory: demo
        run: npm ci

      - name: TypeScript check
        working-directory: demo
        run: npx tsc --noEmit

      - name: Build
        working-directory: demo
        env:
          VITE_API_URL: https://api.demo.aevum.build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
