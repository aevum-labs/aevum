name: Demo Smoke Test

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:
  workflow_run:              # Trigger after successful Deploy Demo workflow
    workflows: ["Deploy Demo"]
    types: [completed]

permissions:
  contents: read
  issues: write

env:
  DEMO_API_URL: https://demo.aevum.build

jobs:
  smoke-test:
    name: Smoke test live demo
    runs-on: ubuntu-latest
    # Only run on workflow_run if the triggering workflow succeeded
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Health check (with cold-start warm-up)
        id: health
        run: |
          # Poll up to 60 s to handle Fly.io cold starts (min_machines_running=0).
          STATUS="000"
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "$DEMO_API_URL/health" --max-time 10) || STATUS="000"
            echo "Health attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then break; fi
            [ $i -lt 6 ] && sleep 10
          done
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "200" ]; then
            echo "HEALTH_FAILED=true" >> $GITHUB_ENV
          else
            # Brief pause after wake-up before the first POST hits the app.
            sleep 3
          fi

      - name: Scan step
        id: scan
        if: env.HEALTH_FAILED != 'true'
        run: |
          TASK_ID=""
          for i in 1 2 3; do
            HTTP_STATUS=$(curl -s -o /tmp/scan_resp -w "%{http_code}" \
              -X POST "$DEMO_API_URL/sandbox/scan" \
              -H "Content-Type: application/json" \
              -d '{"host_id": "smoke-test", "scan_type": "diagnostic"}' \
              --max-time 20) || HTTP_STATUS="000"
            RESPONSE=$(cat /tmp/scan_resp 2>/dev/null) || RESPONSE=""
            echo "Scan attempt $i: HTTP $HTTP_STATUS"
            echo "Scan response: $RESPONSE"
            TASK_ID=$(echo "$RESPONSE" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('task_id',''))" 2>/dev/null) || TASK_ID=""
            if [ -n "$TASK_ID" ]; then break; fi
            [ $i -lt 3 ] && sleep 5
          done
          echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
          if [ -z "$TASK_ID" ]; then
            echo "SCAN_FAILED=true" >> $GITHUB_ENV
          fi

      - name: Consent step
        id: consent
        if: env.SCAN_FAILED != 'true' && env.HEALTH_FAILED != 'true'
        run: |
          TASK_ID="${{ steps.scan.outputs.task_id }}"
          HTTP_STATUS=$(curl -s -o /tmp/consent_resp -w "%{http_code}" \
            -X POST "$DEMO_API_URL/sandbox/consent" \
            -H "Content-Type: application/json" \
            -d "{\"task_id\": \"$TASK_ID\", \"decision\": \"approve\"}" \
            --max-time 15) || HTTP_STATUS="000"
          RESPONSE=$(cat /tmp/consent_resp 2>/dev/null) || RESPONSE=""
          echo "Consent: HTTP $HTTP_STATUS"
          echo "Consent response: $RESPONSE"
          TOKEN=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('consent_token',''))" 2>/dev/null) || TOKEN=""
          echo "consent_token=$TOKEN" >> $GITHUB_OUTPUT
          if [ -z "$TOKEN" ]; then
            echo "CONSENT_FAILED=true" >> $GITHUB_ENV
          fi

      - name: Execute step
        id: execute
        if: env.CONSENT_FAILED != 'true' && env.SCAN_FAILED != 'true' && env.HEALTH_FAILED != 'true'
        run: |
          TASK_ID="${{ steps.scan.outputs.task_id }}"
          TOKEN="${{ steps.consent.outputs.consent_token }}"
          HTTP_STATUS=$(curl -s -o /tmp/execute_resp -w "%{http_code}" \
            -X POST "$DEMO_API_URL/sandbox/execute" \
            -H "Content-Type: application/json" \
            -d "{\"task_id\": \"$TASK_ID\", \"consent_token\": \"$TOKEN\"}" \
            --max-time 15) || HTTP_STATUS="000"
          RESPONSE=$(cat /tmp/execute_resp 2>/dev/null) || RESPONSE=""
          echo "Execute: HTTP $HTTP_STATUS"
          echo "Execute response: $RESPONSE"
          HEAD=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('sigchain_head',''))" 2>/dev/null) || HEAD=""
          if [ -z "$HEAD" ]; then
            echo "EXECUTE_FAILED=true" >> $GITHUB_ENV
          fi
          echo "Sigchain head: $HEAD"

      - name: Sigchain step
        if: >
          env.HEALTH_FAILED != 'true' &&
          env.SCAN_FAILED != 'true' &&
          env.CONSENT_FAILED != 'true' &&
          env.EXECUTE_FAILED != 'true'
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/sigchain_resp -w "%{http_code}" \
            "$DEMO_API_URL/sandbox/sigchain" --max-time 10) || HTTP_STATUS="000"
          RESPONSE=$(cat /tmp/sigchain_resp 2>/dev/null) || RESPONSE=""
          echo "Sigchain: HTTP $HTTP_STATUS"
          echo "Sigchain response: $RESPONSE"
          COUNT=$(echo "$RESPONSE" | python3 -c \
            "import sys,json; print(json.load(sys.stdin).get('entry_count',0))" 2>/dev/null) || COUNT=0
          echo "Sigchain entries: $COUNT"
          if [ "${COUNT:-0}" -lt 1 ]; then
            echo "SIGCHAIN_FAILED=true" >> $GITHUB_ENV
          fi

      - name: Close resolved incident issues on success
        if: >
          env.HEALTH_FAILED != 'true' &&
          env.SCAN_FAILED != 'true' &&
          env.CONSENT_FAILED != 'true' &&
          env.EXECUTE_FAILED != 'true' &&
          env.SIGCHAIN_FAILED != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN_NUMS=$(gh issue list \
            --label demo-outage \
            --state open \
            --json number \
            --jq '.[].number' 2>/dev/null || echo "")
          for num in $OPEN_NUMS; do
            gh issue close "$num" \
              --comment "Demo smoke test passed — outage resolved." \
              2>/dev/null || true
          done

      - name: Open incident issue on failure
        if: >
          always() && (
            env.HEALTH_FAILED == 'true' ||
            env.SCAN_FAILED == 'true' ||
            env.CONSENT_FAILED == 'true' ||
            env.EXECUTE_FAILED == 'true' ||
            env.SIGCHAIN_FAILED == 'true'
          )
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the label exists (idempotent — ignored if already present)
          gh label create "demo-outage" \
            --color "d73a4a" \
            --description "Demo API outage detected by smoke test" \
            2>/dev/null || true

          # Determine which step failed
          if [ "$HEALTH_FAILED" = "true" ]; then
            STEP="health check"
          elif [ "$SCAN_FAILED" = "true" ]; then
            STEP="scan endpoint"
          elif [ "$CONSENT_FAILED" = "true" ]; then
            STEP="consent endpoint"
          elif [ "$EXECUTE_FAILED" = "true" ]; then
            STEP="execute endpoint"
          else
            STEP="sigchain endpoint"
          fi

          TITLE="demo-outage: $STEP failed ($(date -u +'%Y-%m-%d %H:%M UTC'))"

          # Don't open duplicate issues — check for open outage issues
          OPEN=$(gh issue list \
            --label demo-outage \
            --state open \
            --json number \
            --jq 'length' 2>/dev/null || echo "0")

          if [ "$OPEN" = "0" ]; then
            gh issue create \
              --title "$TITLE" \
              --label "demo-outage" \
              --body "Automated smoke test failed at step: **$STEP**
          API: $DEMO_API_URL
          Time: $(date -u)
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          exit 1  # fail the workflow so the red X is visible in Actions
