name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "fly.toml"
      - "Dockerfile"
      - "demo/src/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Propagate ingest token to Fly.io secrets
        run: |
          if [ -n "$MAINTENANCE_INGEST_TOKEN" ]; then
            flyctl secrets set \
              MAINTENANCE_INGEST_TOKEN="$MAINTENANCE_INGEST_TOKEN" \
              --app aevum-maintainer
          else
            echo "MAINTENANCE_INGEST_TOKEN not configured — skipping"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          MAINTENANCE_INGEST_TOKEN: ${{ secrets.MAINTENANCE_INGEST_TOKEN }}

      - name: Ensure persistent volume exists (only if missing)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          count=$(flyctl volumes list -a aevum-maintainer --json \
            | python3 -c 'import sys,json;print(sum(1 for v in json.load(sys.stdin) if v.get("name")=="aevum_maintainer_data"))')
          if [ "$count" -ge 1 ]; then
            echo "Volume aevum_maintainer_data already exists (count=$count) — skipping create"
          else
            flyctl volumes create aevum_maintainer_data --region iad --size 1 --app aevum-maintainer --yes
          fi

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --no-cache
