name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "fly.toml"
      - "Dockerfile"
      - "demo/src/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Propagate secrets to Fly.io
        run: |
          if [ -n "$MAINTENANCE_INGEST_TOKEN" ]; then
            flyctl secrets set \
              MAINTENANCE_INGEST_TOKEN="$MAINTENANCE_INGEST_TOKEN" \
              --app aevum-maintainer
          else
            echo "MAINTENANCE_INGEST_TOKEN not configured — skipping"
          fi
          if [ -n "$AEVUM_MAINTAINER_SIGNING_KEY" ]; then
            flyctl secrets set \
              AEVUM_MAINTAINER_SIGNING_KEY="$AEVUM_MAINTAINER_SIGNING_KEY" \
              --app aevum-maintainer
          else
            echo "AEVUM_MAINTAINER_SIGNING_KEY not configured -- skipping"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          MAINTENANCE_INGEST_TOKEN: ${{ secrets.MAINTENANCE_INGEST_TOKEN }}
          AEVUM_MAINTAINER_SIGNING_KEY: ${{ secrets.AEVUM_MAINTAINER_SIGNING_KEY }}

      - name: Ensure persistent volume exists (only if missing)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          count=$(flyctl volumes list -a aevum-maintainer --json \
            | python3 -c 'import sys,json;print(sum(1 for v in json.load(sys.stdin) if v.get("name")=="aevum_maintainer_data"))')
          if [ "$count" -ge 1 ]; then
            echo "Volume aevum_maintainer_data already exists (count=$count) — skipping create"
          else
            flyctl volumes create aevum_maintainer_data --region iad --size 1 --app aevum-maintainer --yes
          fi

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only --no-cache
