name: Deploy Demo

on:
  push:
    branches: [main]
    paths:
      - "demo/**"

jobs:
  axe-audit:
    name: Accessibility audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install demo dependencies
        working-directory: demo
        run: pip install -r requirements.txt

      - name: Start demo server
        working-directory: demo
        env:
          AEVUM_DEV: "1"
        run: |
          python main.py &
          echo $! > /tmp/demo.pid
          sleep 5

      - name: Install axe-cli
        run: npm install -g @axe-core/cli

      - name: Run axe against landing page
        run: axe http://localhost:7860/ --exit

      - name: Stop demo server
        if: always()
        run: kill $(cat /tmp/demo.pid) 2>/dev/null || true

  deploy:
    name: Deploy to Fly.io
    needs: axe-audit
    runs-on: ubuntu-latest
    environment: demo
    steps:
      - uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: demo
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEMO }}
        run: flyctl deploy --remote-only
