name: Deploy Demo

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
  workflow_dispatch:

jobs:
  axe-audit:
    name: Accessibility audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node
        # actions/setup-node: no SHA available in existing workflows — exception documented in Session 14
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: demo/package-lock.json

      - name: Build frontend
        working-directory: demo
        run: npm ci && npm run build

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install demo dependencies
        working-directory: demo
        run: pip install -r requirements.txt

      - name: Start demo server
        working-directory: demo
        env:
          AEVUM_DEV: "1"
        run: |
          python main.py &
          echo $! > /tmp/demo.pid
          sleep 5

      - name: Install axe-cli
        run: npm install -g @axe-core/cli

      - name: Sync Chrome and ChromeDriver versions
        run: npx browser-driver-manager install chrome

      - name: Run axe against landing page
        run: axe http://localhost:7860/ --exit

      - name: Stop demo server
        if: always()
        run: kill $(cat /tmp/demo.pid) 2>/dev/null || true

  deploy:
    name: Deploy to Fly.io
    needs: axe-audit
    runs-on: ubuntu-latest
    environment: demo
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up flyctl
        # superfly/flyctl-actions: pinned SHA not available in this env — kept at @master
        # Exception documented: Session 14 report. Revisit when gh CLI is available.
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        working-directory: demo
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_DEMO }}
        run: flyctl deploy --remote-only
