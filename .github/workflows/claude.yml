name: claude

# Responds to @claude mentions in issues and pull requests.
# Enables lightweight one-off fixes from GitHub mobile — just mention @claude.
# Also manually triggerable from Actions → claude → Run workflow.
#
# Examples of what to write in an issue:
#   "@claude fix the broken link in docs/learn/barriers.md"
#   "@claude update the getting-started example to use Engine v2 API"
#   "@claude there's a typo in CHANGELOG.md under v0.4.0"

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      prompt:
        description: Task for Claude Code
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    # Only run on @claude mentions in issue comments, or manual dispatch
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - uses: anthropics/claude-code-action@51ea8ea73a139f2a74ff649e3092c25a904aed7e  # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Scope: lightweight fixes only. Not for major features or releases.
          custom_instructions: |
            You are maintaining the Aevum open-source project.
            Standing rules (must not be violated):
            - Never include tests/__init__.py
            - mypy always per-package: uv run mypy --package aevum.X
            - Verify scripts must be gitignored — never commit them
            - JwksCache.invalidate() must clear both _fetched_at AND _keys
            - CLI tests must strip ANSI codes before string assertions
            - Build backend is hatchling only
            - All packages must be at the same version
            - Docs ship with code — mkdocs build --strict must pass
            Scope for this session: the specific task mentioned in the issue.
            Open a PR with your changes — do not push directly to main.
            Include test results, mypy status, and mkdocs build status in the PR description.
