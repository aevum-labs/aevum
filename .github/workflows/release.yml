name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write     # Required for Trusted Publishing (OIDC)
      contents: write     # Required for GitHub release creation

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          pip install "hatchling>=1.21" "build>=1.0" "cyclonedx-bom>=4.0"

      - name: Build all packages
        run: |
          mkdir -p dist
          for pkg in packages/aevum-*/; do
            echo "Building $pkg..."
            python -m build "$pkg" --outdir dist/
          done
          echo "Built packages:"
          ls dist/

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          pip install "aevum-core" --find-links dist/ || true
          cyclonedx-py environment \
            --output-format json \
            --output-file sbom.json
          echo "SBOM generated: $(wc -l < sbom.json) lines"

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      - name: Publish to PyPI (Trusted Publishing — no API key)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: dist/
          attestations: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release create "$RELEASE_TAG" \
            --generate-notes \
            dist/*.whl dist/*.tar.gz sbom.json
