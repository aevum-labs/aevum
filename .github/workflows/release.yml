name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aevum-core/

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Verify workspace syncs cleanly
        run: uv sync --frozen

      - name: Build all packages
        run: |
          mkdir -p dist
          uv build packages/aevum-core --out-dir dist/
          uv build packages/aevum-server --out-dir dist/
          uv build packages/aevum-sdk --out-dir dist/
          uv build packages/aevum-store-oxigraph --out-dir dist/
          uv build packages/aevum-store-postgres --out-dir dist/
          uv build packages/aevum-mcp --out-dir dist/
          uv build packages/aevum-oidc --out-dir dist/
          uv build packages/aevum-llm --out-dir dist/
          uv build packages/aevum-cli --out-dir dist/
          uv build packages/aevum-store-jena --out-dir dist/
          echo "Built packages:"
          ls dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
