name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        # NOTE: this input only LABELS the SBOM/attestation filenames. It does NOT select the
        # source that gets built — actions/checkout uses the ref you dispatch from. To (re)publish
        # a specific version, dispatch this workflow FROM THAT TAG, not from main.
        description: "Tag label, e.g. v0.9.0. Dispatch FROM the matching tag — this does not pick the source."
        required: true
        type: string
      dry_run:
        description: "Validation run: build, SBOM, attest and upload, but publish NOTHING to PyPI."
        required: false
        default: true
        type: boolean

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write     # Required for Trusted Publishing (OIDC) and Sigstore attestation
      contents: write     # Required for GitHub release creation
      attestations: write # Required for attest-build-provenance
    env:
      RELEASE_TAG: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          pip install "hatchling>=1.21" "build>=1.0" "cyclonedx-bom==7.3.0"

      - name: Build all packages
        run: |
          mkdir -p dist
          for pkg in packages/aevum-*/; do
            echo "Building $pkg..."
            python -m build "$pkg" --outdir dist/
          done
          echo "Built packages:"
          ls dist/

      - name: Remove private packages from dist
        run: |
          rm -f dist/aevum_maintainer-*.whl dist/aevum_maintainer-*.tar.gz

      - name: Generate SBOM (CycloneDX JSON)
        run: python scripts/generate_sbom.py --output "sbom-$RELEASE_TAG.json"

      - name: Verify SBOM contents
        # Gate: a wrong SBOM must never reach actions/attest.
        run: python scripts/verify_sbom.py "sbom-$RELEASE_TAG.json"

      - name: Copy SBOM for compliance pack
        run: cp "sbom-$RELEASE_TAG.json" sbom.json
        # G16: compliance_pack.py looks for sbom.json in CWD;
        # release.yml generates sbom-{version}.json. This bridges the gap.

      - name: Attest SBOM
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: sbom-${{ env.RELEASE_TAG }}.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom-${{ env.RELEASE_TAG }}.json
          retention-days: 90

      - name: Verify PyPI registration
        run: |
          echo "Checking PyPI registration for all packages..."
          warned=()
          for pyproject in packages/aevum-*/pyproject.toml; do
            name=$(grep '^name' "$pyproject" | cut -d'"' -f2)
            if [[ "$name" == "aevum-maintainer" ]]; then
              echo "  Skipping private package: $name"
              continue
            fi
            status=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/$name/json")
            if [[ "$status" == "404" ]]; then
              echo "  WARNING: $name not yet on PyPI — may have a pending publisher." \
                   "The first upload will create the project. See docs/deployment/new-package.md"
              warned+=("$name")
            elif [[ "$status" == "200" ]]; then
              echo "  OK: $name exists on PyPI"
            elif [[ "$status" == "000" ]]; then
              echo "  ERROR: Network failure reaching PyPI for $name (curl exit, HTTP 000)"
              exit 1
            else
              echo "  WARNING: Unexpected HTTP $status for $name — treating as non-fatal"
              warned+=("$name")
            fi
          done
          if [[ "${#warned[@]}" -gt 0 ]]; then
            echo ""
            echo "Pre-flight summary — packages with WARNING (will attempt upload anyway):"
            for pkg in "${warned[@]}"; do
              echo "  - $pkg"
            done
          else
            echo "All public packages are registered on PyPI."
          fi

      - name: Publish to PyPI (Trusted Publishing — no API key)
        # Tag pushes always publish (inputs.dry_run is null there, short-circuited by the first
        # clause). A manual dispatch publishes only when dry_run is explicitly false.
        if: github.event_name == 'push' || inputs.dry_run != true
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: dist/
          attestations: true
          skip-existing: true          # re-publish-safe; skips versions already on PyPI

      - name: Create GitHub Release
        if: github.event_name == 'push'      # only on tag push, skip on manual dispatch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --clobber \
            dist/*.whl dist/*.tar.gz "sbom-$RELEASE_TAG.json"
          echo "Release $RELEASE_TAG created successfully"

      - name: Ingest release.published to production sigchain
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          MAINTENANCE_INGEST_TOKEN: ${{ secrets.MAINTENANCE_INGEST_TOKEN }}
          DEMO_API_URL: https://demo.aevum.build
        run: |
          if [ -z "$MAINTENANCE_INGEST_TOKEN" ]; then
            echo "MAINTENANCE_INGEST_TOKEN not set — skipping ingest"
            exit 0
          fi
          curl -sf \
            -X POST "${DEMO_API_URL}/v1/maintenance/ingest" \
            -H "Authorization: Bearer ${MAINTENANCE_INGEST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"session_id\": \"release-${RELEASE_TAG}\",
              \"entries\": [
                {
                  \"action\": \"release.published\",
                  \"resource\": \"aevum-labs/aevum\",
                  \"principal\": \"github_actions\",
                  \"payload\": {
                    \"tag\": \"${RELEASE_TAG}\",
                    \"summary\": \"Release ${RELEASE_TAG} published to PyPI\"
                  }
                }
              ]
            }" \
            && echo "✅ release.published ingested to production sigchain" \
            || echo "⚠️  Ingest failed (non-blocking)"
