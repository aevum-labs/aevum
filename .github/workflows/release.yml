name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # Required for OIDC Trusted Publisher authentication

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/aevum-core/

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Verify all packages build cleanly
        run: uv sync --frozen

      - name: Build all packages
        run: |
          mkdir -p dist
          for pkg in \
            aevum-core \
            aevum-server \
            aevum-sdk \
            aevum-store-oxigraph \
            aevum-store-postgres \
            aevum-mcp \
            aevum-oidc \
            aevum-llm \
            aevum-cli; do
            echo "Building $pkg..."
            uv build packages/$pkg --out-dir dist/
          done
          echo "Built packages:"
          ls dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Trusted Publisher -- no API token required.
          # Configure at: https://pypi.org/manage/account/publishing/
          # For each package: owner=aevum-labs, repo=aevum, workflow=release.yml, env=pypi
