name: Release

on:
  push:
    tags:
      - "aevum-*-v[0-9]*"

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      package-name: ${{ steps.parse-tag.outputs.package-name }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Parse tag to determine package
        id: parse-tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Tag format: aevum-core-v0.1.0 → package name: aevum-core
          # Strip the trailing -vX.Y.Z
          PACKAGE=$(echo "$TAG" | sed 's/-v[0-9].*//')
          echo "package-name=$PACKAGE" >> "$GITHUB_OUTPUT"
          echo "Building package: $PACKAGE"
      - name: Build package
        run: |
          PACKAGE="${{ steps.parse-tag.outputs.package-name }}"
          uv build --package "$PACKAGE" --out-dir dist/
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{ needs.build.outputs.package-name }}
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
