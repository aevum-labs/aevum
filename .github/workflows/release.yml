name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write     # Required for Trusted Publishing (OIDC)
      contents: write     # Required for GitHub release creation

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          pip install "hatchling>=1.21" "build>=1.0" "cyclonedx-bom>=4.0"

      - name: Build all packages
        run: |
          mkdir -p dist
          for pkg in packages/aevum-*/; do
            echo "Building $pkg..."
            python -m build "$pkg" --outdir dist/
          done
          echo "Built packages:"
          ls dist/

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          pip install "aevum-core" --find-links dist/ || true
          cyclonedx-py environment \
            --output-format json \
            --output-file sbom.json
          echo "SBOM generated: $(wc -l < sbom.json) lines"

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      - name: Publish to PyPI (Trusted Publishing — no API key)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            sbom.json
          generate_release_notes: true
