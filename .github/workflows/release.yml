name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write     # Required for Trusted Publishing (OIDC) and Sigstore attestation
      contents: write     # Required for GitHub release creation
      attestations: write # Required for attest-build-provenance
    env:
      RELEASE_TAG: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          pip install "hatchling>=1.21" "build>=1.0" "cyclonedx-bom>=4.0"

      - name: Build all packages
        run: |
          mkdir -p dist
          for pkg in packages/aevum-*/; do
            echo "Building $pkg..."
            python -m build "$pkg" --outdir dist/
          done
          echo "Built packages:"
          ls dist/

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          pip install "aevum-core" --find-links dist/ || true
          cyclonedx-py environment \
            --output-format json \
            --output-file "sbom-$RELEASE_TAG.json"
          echo "SBOM generated: $(wc -l < "sbom-$RELEASE_TAG.json") lines"

      - name: Copy SBOM for compliance pack
        run: cp "sbom-$RELEASE_TAG.json" sbom.json
        # G16: compliance_pack.py looks for sbom.json in CWD;
        # release.yml generates sbom-{version}.json. This bridges the gap.

      - name: Attest SBOM
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2  # v2.2.3
        with:
          subject-path: sbom-${{ env.RELEASE_TAG }}.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom
          path: sbom-${{ env.RELEASE_TAG }}.json
          retention-days: 90

      - name: Remove private packages from dist
        run: |
          rm -f dist/aevum_maintainer-*.whl dist/aevum_maintainer-*.tar.gz
          rm -f dist/aevum_llm-*.whl dist/aevum_llm-*.tar.gz

      - name: Verify PyPI registration
        run: |
          echo "Checking PyPI registration for all packages..."
          warned=()
          for pyproject in packages/aevum-*/pyproject.toml; do
            name=$(grep '^name' "$pyproject" | cut -d'"' -f2)
            if [[ "$name" == "aevum-maintainer" ]]; then
              echo "  Skipping private package: $name"
              continue
            fi
            status=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/$name/json")
            if [[ "$status" == "404" ]]; then
              echo "  WARNING: $name not yet on PyPI — may have a pending publisher." \
                   "The first upload will create the project. See docs/deployment/new-package.md"
              warned+=("$name")
            elif [[ "$status" == "200" ]]; then
              echo "  OK: $name exists on PyPI"
            elif [[ "$status" == "000" ]]; then
              echo "  ERROR: Network failure reaching PyPI for $name (curl exit, HTTP 000)"
              exit 1
            else
              echo "  WARNING: Unexpected HTTP $status for $name — treating as non-fatal"
              warned+=("$name")
            fi
          done
          if [[ "${#warned[@]}" -gt 0 ]]; then
            echo ""
            echo "Pre-flight summary — packages with WARNING (will attempt upload anyway):"
            for pkg in "${warned[@]}"; do
              echo "  - $pkg"
            done
          else
            echo "All public packages are registered on PyPI."
          fi

      - name: Publish to PyPI (Trusted Publishing — no API key)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
        with:
          packages-dir: dist/
          attestations: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists — skipping creation"
            echo "PyPI publish is the critical path; GitHub Release is display only."
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              dist/*.whl dist/*.tar.gz "sbom-$RELEASE_TAG.json" \
              2>/dev/null || \
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes \
              dist/*.whl dist/*.tar.gz \
            && echo "Release $RELEASE_TAG created successfully"
          fi
