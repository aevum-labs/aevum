name: dependency-refresh

# Clears security advisories frozen in uv.lock by relocking the affected
# packages, pushing a relock BRANCH, and notifying the maintainer to open the
# PR themselves (branch + notify). A maintainer-opened PR runs the required
# checks; a bot-opened one would not — and a security relock should be a
# conscious human merge. Never auto-merged. Replaces Dependabot's uv updater,
# which fails on this multi-member workspace (run /1419382975).
# security.yml (weekly pip-audit) remains the authoritative detection backstop.

on:
  schedule:
    - cron: '0 9 * * 1'      # weekly, Monday 09:00 UTC
  workflow_dispatch:          # mobile-dispatchable

permissions:
  contents: write             # push the relock branch
  issues: write               # open the notify issue

concurrency:
  group: dependency-refresh
  cancel-in-progress: false

jobs:
  refresh:
    name: Relock to clear advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        # NOTE: persist-credentials left at default (true) — this workflow must push.

      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5

      - name: Sync (frozen baseline)
        run: uv sync --frozen

      - name: Audit current lock → list vulnerable packages
        id: audit
        run: |
          set -uo pipefail
          uv export --no-editable --format requirements-txt \
            | grep -v "^\./packages/" > /tmp/audit-req.txt
          uv run pip-audit --format json --ignore-vuln PYSEC-2025-183 \
            -r /tmp/audit-req.txt > /tmp/audit.json || true
          PKGS=$(jq -r '.dependencies[]? | select((.vulns // []) | length > 0) | .name' /tmp/audit.json 2>/dev/null | sort -u | tr '\n' ' ' | sed 's/ *$//')
          echo "pkgs=$PKGS" >> "$GITHUB_OUTPUT"
          if [ -z "$PKGS" ]; then
            echo "clean=true"  >> "$GITHUB_OUTPUT"
            echo "✅ uv.lock has no known advisories — nothing to do."
          else
            echo "clean=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ advisories in: $PKGS"
          fi

      - name: Relock affected packages
        if: steps.audit.outputs.clean == 'false'
        run: |
          set -euo pipefail
          for p in ${{ steps.audit.outputs.pkgs }}; do
            echo "::group::uv lock --upgrade-package $p"
            uv lock --upgrade-package "$p"
            echo "::endgroup::"
          done

      - name: Re-audit (must be clean) + full test suite (gate)
        if: steps.audit.outputs.clean == 'false'
        run: |
          set -euo pipefail
          uv export --no-editable --format requirements-txt \
            | grep -v "^\./packages/" > /tmp/audit-req2.txt
          uv run pip-audit --desc on --ignore-vuln PYSEC-2025-183 -r /tmp/audit-req2.txt
          uv sync --frozen
          uv run pytest -q

      - name: Push relock branch + notify maintainer (branch + notify)
        if: steps.audit.outputs.clean == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSIGNEE: ${{ vars.RELOCK_NOTIFY_ASSIGNEE }}
        run: |
          set -euo pipefail
          if git diff --quiet -- uv.lock; then
            echo "uv.lock unchanged after relock — nothing to ship."
            echo "uv.lock unchanged after relock — no branch pushed." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          BRANCH="auto/dep-refresh-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add uv.lock
          git commit -m "security: relock to clear advisories (${{ steps.audit.outputs.pkgs }})"
          git push origin "$BRANCH"

          # --- branch is safe on origin from here; notify is best-effort and must NOT fail the run ---
          set +e
          NEW_PR_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/new/${BRANCH}"
          OWNER="${GITHUB_REPOSITORY_OWNER}"

          {
            echo "## 🔒 Relock branch ready — open the PR yourself"
            echo ""
            echo "Advisories cleared in: ${{ steps.audit.outputs.pkgs }}"
            echo ""
            echo "A maintainer-opened PR runs the required checks (a bot-opened one would not):"
            echo ""
            echo "➡️ $NEW_PR_URL"
            echo ""
            echo "Self-gated above — re-audit clean, tests pass. Review the uv.lock diff and merge on green."
          } >> "$GITHUB_STEP_SUMMARY"

          {
            printf '%s\n' \
              "Automated relock cleared advisories in: ${{ steps.audit.outputs.pkgs }}" \
              "" \
              "Open the PR as yourself so the required checks run, then merge on green:" \
              "" \
              "$NEW_PR_URL" \
              "" \
              "- Re-audit: clean (pip-audit exit 0)" \
              "- Tests: pass (uv run pytest)" \
              "- Branch: $BRANCH (commit already on origin)" \
              "" \
              "cc @$OWNER" \
              "" \
              "Not auto-PR'd by design (branch + notify). Detection backstop: security.yml."
          } > /tmp/relock-issue.md

          ARGS=(--title "security: relock ready — clear advisories ($BRANCH)" --body-file /tmp/relock-issue.md)
          [ -n "${ASSIGNEE:-}" ] && ARGS+=(--assignee "$ASSIGNEE")
          if gh issue create "${ARGS[@]}"; then
            echo "Notify issue created for $BRANCH."
          else
            echo "::warning::Notify issue could not be created — branch is pushed; open the PR manually: $NEW_PR_URL"
          fi
