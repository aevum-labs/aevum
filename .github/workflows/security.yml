name: Security

on:
  schedule:
    - cron: "0 9 * * 1"
  push:
    branches: [main]

jobs:
  audit:
    name: Dependency audit (uv audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Audit dependencies
        run: uv audit
