name: Security

on:
  schedule:
    - cron: "0 9 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "latest"
      - name: Audit dependencies
        run: |
          # Export pinned third-party deps and strip all local file:// references.
          # --no-editable removes editable workspace members; the grep removes
          # path dependencies (e.g. aevum-agent) that uv exports as file:// URLs.
          # pip-audit cannot hash-verify file:// directory references.
          # PYSEC-2025-183 (pyjwt): disputed by supplier, no fix version available.
          uv export --no-editable --format requirements-txt \
            | grep -v "file://" \
            > /tmp/audit-requirements.txt
          uv run pip-audit --desc on --ignore-vuln PYSEC-2025-183 \
            -r /tmp/audit-requirements.txt
