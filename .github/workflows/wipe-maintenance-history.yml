name: Wipe maintenance_entries (gated, one-time)
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dryrun = count rows only; DELETE = actually wipe"
        required: true
        default: "dryrun"
        type: choice
        options: [dryrun, DELETE]
permissions: { contents: read }
jobs:
  wipe:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Wipe or preview maintenance_entries
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          MODE: ${{ inputs.mode }}
        run: |
          set -euo pipefail
          if [ "$MODE" = "DELETE" ]; then
            PYSCRIPT='import sqlite3
          c = sqlite3.connect("/data/aevum_maintainer.db")
          c.execute("DELETE FROM maintenance_entries")
          c.commit()
          print("wiped rows:", c.total_changes, flush=True)
          import sys; print("wiped rows:", c.total_changes, file=sys.stderr, flush=True)
          c.close()'
          else
            PYSCRIPT='import sqlite3
          c = sqlite3.connect("/data/aevum_maintainer.db")
          n = c.execute("SELECT COUNT(*) FROM maintenance_entries").fetchone()[0]
          print("row count (dryrun, nothing changed):", n, flush=True)
          import sys; print("row count (dryrun, nothing changed):", n, file=sys.stderr, flush=True)
          c.close()'
          fi
          ENCODED=$(echo "$PYSCRIPT" | base64 -w0)
          flyctl ssh console -a aevum-maintainer \
            -C "echo $ENCODED | base64 -d | python3 -u -"
