name: docker-build

# Builds the container image on any PR that touches the Dockerfile, so a
# base-image change — including Dependabot digest/version bumps — is proven to
# build BEFORE it can reach main and trigger a Fly deploy. deploy-api.yml only
# builds on push-to-main (via flyctl deploy); this closes that gap at PR time.
#
# This workflow's own path is in the filter so edits to it re-run the build
# (self-validating). Merging a workflow-only change does not redeploy.

on:
  pull_request:
    paths:
      - "Dockerfile"
      - ".github/workflows/docker-build.yml"

permissions:
  contents: read

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Build image (no push)
        run: docker build -t "aevum-maintainer:pr-${{ github.event.pull_request.number }}" .
