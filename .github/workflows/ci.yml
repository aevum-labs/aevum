name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run ruff
        run: uv run ruff check .

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run mypy (per-package — standing rule 02)
        run: |
          uv run mypy --package aevum.core --config-file packages/aevum-core/pyproject.toml
          uv run mypy --package aevum.server --config-file packages/aevum-server/pyproject.toml
          uv run mypy --package aevum.store.oxigraph --config-file packages/aevum-store-oxigraph/pyproject.toml
          uv run mypy --package aevum.mcp --config-file packages/aevum-mcp/pyproject.toml
          uv run mypy --package aevum.cli --config-file packages/aevum-cli/pyproject.toml
          uv run mypy --package aevum.agent --config-file packages/aevum-agent/pyproject.toml

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: pip-audit
        run: |
          uv run pip-audit --desc on || true
      - name: bandit
        run: |
          uv run bandit -r packages/ -ll -q

  namespace-check:
    name: Namespace discipline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check namespace packages
        run: python scripts/check_namespace.py

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --frozen --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest
