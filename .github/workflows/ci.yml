name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run ruff
        run: uv run ruff check .
      - name: No hardcoded Rekor URLs (D-08)
        # Fail if any Python source file contains a hardcoded rekor.sigstore.dev URL.
        # All Rekor URLs must come from AEVUM_REKOR_URL env var or explicit config.
        # Self-hosted Rekor setup: docs/deployment/rekor-self-hosted.md
        run: |
          if grep -r "rekor\.sigstore\.dev" packages/ --include="*.py" -l; then
            echo "ERROR: Hardcoded rekor.sigstore.dev URL found in Python source."
            echo "Remove it and use AEVUM_REKOR_URL env var instead."
            exit 1
          fi
          echo "OK: No hardcoded Rekor URLs in Python source."
      - name: No forbidden claim regressions
        run: bash scripts/check-claims.sh

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run mypy (per-package — standing rule 02)
        run: |
          uv run mypy --package aevum.core --config-file packages/aevum-core/pyproject.toml
          uv run mypy --package aevum.server --config-file packages/aevum-server/pyproject.toml
          uv run mypy --package aevum.store.oxigraph --config-file packages/aevum-store-oxigraph/pyproject.toml
          uv run mypy --package aevum.mcp --config-file packages/aevum-mcp/pyproject.toml
          uv run mypy --package aevum.cli --config-file packages/aevum-cli/pyproject.toml
          uv run mypy --package aevum.agent --config-file packages/aevum-agent/pyproject.toml

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: pip-audit
        run: |
          uv run pip-audit --desc on || true
      - name: bandit
        run: |
          uv run bandit -r packages/ -ll -q
      - name: Security release-check (pip-audit + weak primitives)
        run: bash scripts/check-security.sh

  namespace-check:
    name: Namespace discipline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"
      - name: Check namespace packages
        run: python scripts/check_namespace.py

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "latest"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Build liboqs C library (required by liboqs-python)
        run: |
          sudo apt-get install -y --no-install-recommends cmake ninja-build
          curl -fsSL https://github.com/open-quantum-safe/liboqs/archive/refs/tags/0.14.0.tar.gz | tar xz
          cmake -GNinja \
            -DCMAKE_INSTALL_PREFIX="$HOME/_oqs" \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_USE_OPENSSL=OFF \
            -S liboqs-0.14.0 -B liboqs-build
          ninja -C liboqs-build -j$(nproc) install
          rm -rf liboqs-0.14.0 liboqs-build
      - name: Wire liboqs onto the loader path
        run: |
          echo "LD_LIBRARY_PATH=$HOME/_oqs/lib:$HOME/_oqs/lib64:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
      - name: Install dependencies
        run: uv sync --frozen --extra pqc --python ${{ matrix.python-version }}
      - name: Verify liboqs is loadable (fail loud, not as a buried signing error)
        run: |
          uv run --python ${{ matrix.python-version }} python -c "import oqs; s=oqs.Signature('ML-DSA-65'); print('liboqs OK:', oqs.oqs_version())"
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest --inline-snapshot=disable

  postgres-integration:
    name: Postgres integration (live migration + v2 chain)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: aevum
          POSTGRES_PASSWORD: aevum
          POSTGRES_DB: aevum_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aevum"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run aevum-store-postgres tests against a live Postgres
        # HO-G-PG2's ADD COLUMN IF NOT EXISTS migration and PostgresLedger's
        # chain-resume-after-restart logic were previously only exercised
        # against FakeConn. AEVUM_TEST_POSTGRES_DSN unskips the integration
        # tests in packages/aevum-store-postgres/tests/, including the
        # populated-table migration + v2 chain round-trip test (PG3).
        env:
          AEVUM_TEST_POSTGRES_DSN: postgresql://aevum:aevum@localhost:5432/aevum_test
        run: uv run pytest packages/aevum-store-postgres/tests/ --inline-snapshot=disable

  zizmor:
    name: GitHub Actions security (zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Run zizmor
        run: |
          pip install zizmor --quiet
          zizmor --format sarif .github/workflows/ > zizmor.sarif 2>/dev/null || true
