name: Conformance

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/aevum-core/**"

permissions:
  contents: read

jobs:
  conformance:
    name: Conformance suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run canary tests (Barriers 1 3 4 5)
        run: uv run pytest packages/aevum-core/tests/test_canary.py -v --tb=short
      # Full aevum-labs/conform@v0 action runs once the action is tagged.
      # When conform@v0 is tagged, replace the step above with:
      #   uses: aevum-labs/conform@v0
      #   with:
      #     implementation-module: aevum.core
