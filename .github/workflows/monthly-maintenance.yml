name: monthly-maintenance

# Runs on the 1st of each month at 13:00 UTC.
# Triggerable anytime from GitHub mobile: Actions → monthly-maintenance → Run workflow.
# Output: step summary readable in GitHub mobile — paste into RESEARCH.md session.

on:
  schedule:
    - cron: '0 13 1 * *'
  workflow_dispatch:

permissions:
  contents: write   # needed to commit scan_results.md back to repo
  id-token: write   # needed to obtain GitHub Actions OIDC token for aevum-maintainer ingest

jobs:
  scan:
    name: Monthly Security and Freshness Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install uv
        run: pip install uv --quiet

      - name: Install workspace
        run: uv sync --all-packages --dev --quiet

      - name: Security scan (pip-audit)
        id: audit
        run: |
          pip install pip-audit --quiet
          uv export --format requirements-txt --no-dev \
            --output-file /tmp/reqs.txt 2>/dev/null
          # Strip local workspace packages — pip-audit can't hash directories.
          # uv export emits them as "-e file:///..." or "-e ./packages/..." depending on context.
          # Use || true so grep's exit code 1 (no lines kept) doesn't abort under set -eo pipefail.
          grep -v -E '^(-e |file://)' /tmp/reqs.txt > /tmp/reqs_filtered.txt || true
          mv /tmp/reqs_filtered.txt /tmp/reqs.txt
          pip-audit --requirement /tmp/reqs.txt \
            --format json --output /tmp/audit.json 2>&1 || true
          # Guarantee the file exists so downstream Python never hits FileNotFoundError
          [ -f /tmp/audit.json ] || echo '{"dependencies":[]}' > /tmp/audit.json

          python3 - <<'EOF'
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/audit.json").read_text())
          found = [
              (d["name"], v["id"], v.get("fix_versions", []))
              for d in data.get("dependencies", [])
              for v in d.get("vulns", [])
          ]

          print("## Security Scan (pip-audit)")
          if found:
              print(f"**{len(found)} CVE(s) found:**")
              for name, vid, fix in found:
                  print(f"- `{name}`: {vid} → fix: {fix}")
          else:
              print("✅ 0 CVEs found")
          EOF

      - name: Dependency freshness
        id: freshness
        run: |
          git stash --include-untracked --quiet 2>/dev/null || true

          echo "## Dependency Updates Available" >> $GITHUB_STEP_SUMMARY
          uv lock --upgrade 2>&1 \
            | grep -E "^(Updated|warning)" \
            | head -20 \
            >> $GITHUB_STEP_SUMMARY \
            || echo "None available or uv lock unchanged" >> $GITHUB_STEP_SUMMARY

          git stash pop --quiet 2>/dev/null || true

      - name: Write step summary
        run: |
          echo "# Aevum Monthly Maintenance — $(date +'%B %Y')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Paste this summary into RESEARCH.md before starting the Claude session.**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # pip-audit results
          python3 - <<'EOF' >> $GITHUB_STEP_SUMMARY
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/audit.json").read_text())
          found = [
              (d["name"], v["id"], v.get("fix_versions", []))
              for d in data.get("dependencies", [])
              for v in d.get("vulns", [])
          ]
          print("## Security Scan (pip-audit)")
          if found:
              print(f"**{len(found)} CVE(s) found** — review exploitability in Claude:")
              for name, vid, fix in found:
                  print(f"- `{name}`: {vid} — fix: `{fix}`")
          else:
              print("✅ 0 CVEs found")
          EOF

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Tests, mypy, ruff, and mkdocs run via ci.yml on every push — check CI tab for current status._" >> $GITHUB_STEP_SUMMARY

      - name: Post scan results to aevum-maintainer
        # Skipped if AEVUM_MAINTAINER_URL is not set (local runs, forks without the secret).
        if: ${{ env.AEVUM_MAINTAINER_URL != '' }}
        env:
          AEVUM_MAINTAINER_URL: ${{ vars.AEVUM_MAINTAINER_URL }}
        run: |
          OIDC_TOKEN=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=aevum-maintainer" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['value'])")
          curl -sf -X POST \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @maintenance/scan_results.md \
            "${AEVUM_MAINTAINER_URL}/v1/ingest/scan-results" \
            || echo "aevum-maintainer ingest skipped (server not reachable)"

      - name: Commit scan results to repo
        run: |
          MONTH=$(date +'%B %Y')
          STAMP=$(date +'%Y-%m-%d')

          # Build scan_results.md — this is what kickoff.py will embed in RESEARCH.md
          cat > maintenance/scan_results.md << SCANEOF
          # Monthly Scan Results — $MONTH
          Generated: $STAMP

          ## Security (pip-audit)
          SCANEOF

          python3 - >> maintenance/scan_results.md <<'EOF'
          import json
          from pathlib import Path

          data = json.loads(Path("/tmp/audit.json").read_text())
          found = [
              (d["name"], v["id"], v.get("fix_versions", []))
              for d in data.get("dependencies", [])
              for v in d.get("vulns", [])
          ]
          if found:
              print(f"{len(found)} CVE(s) found:")
              for name, vid, fix in found:
                  print(f"- {name}: {vid} — fix: {fix}")
          else:
              print("0 CVEs found — clean")
          EOF

          echo "" >> maintenance/scan_results.md
          echo "## Dependency Updates Available" >> maintenance/scan_results.md
          cat /tmp/dep_updates.txt >> maintenance/scan_results.md 2>/dev/null \
            || echo "No updates available" >> maintenance/scan_results.md

          echo "" >> maintenance/scan_results.md
          echo "## CI Status" >> maintenance/scan_results.md
          echo "Check the CI tab for tests, mypy, ruff, and mkdocs results on main." >> maintenance/scan_results.md

          # Commit if changed
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add maintenance/scan_results.md
          git diff --staged --quiet || \
            git commit -m "chore: monthly scan results — $(date +'%B %Y')"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:main 2>/dev/null || echo "Push skipped (no changes)"

      - name: Ingest maintenance run into production sigchain
        if: always()
        continue-on-error: true
        env:
          MAINTENANCE_INGEST_TOKEN: ${{ secrets.MAINTENANCE_INGEST_TOKEN }}
          DEMO_API_URL: https://demo.aevum.build
        run: |
          # Skip silently if token not configured yet
          if [ -z "$MAINTENANCE_INGEST_TOKEN" ]; then
            echo "MAINTENANCE_INGEST_TOKEN not set — skipping ingest"
            exit 0
          fi

          SESSION_ID="maint-${{ github.run_id }}"
          RUN_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read audit results if available
          CVE_COUNT=0
          if [ -f /tmp/audit.json ]; then
            CVE_COUNT=$(python3 -c "
          import json, sys
          d = json.load(open('/tmp/audit.json'))
          print(sum(len(dep.get('vulns',[])) for dep in d.get('dependencies',[])))
          " 2>/dev/null || echo 0)
          fi

          PAYLOAD=$(python3 -c "
          import json
          print(json.dumps({
            'run_id': '${{ github.run_id }}',
            'run_date': '$RUN_DATE',
            'cve_count': $CVE_COUNT,
            'status': 'clean' if $CVE_COUNT == 0 else 'findings',
            'trigger': '${{ github.event_name }}',
            'ref': '${{ github.ref_name }}'
          }))
          ")

          curl -sf \
            -X POST "${DEMO_API_URL}/v1/maintenance/ingest" \
            -H "Authorization: Bearer ${MAINTENANCE_INGEST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"session_id\": \"${SESSION_ID}\",
              \"entries\": [
                {
                  \"action\": \"maintenance.scan\",
                  \"resource\": \"aevum-labs/aevum\",
                  \"principal\": \"github_actions\",
                  \"payload\": ${PAYLOAD}
                },
                {
                  \"action\": \"maintenance.complete\",
                  \"resource\": \"aevum-labs/aevum\",
                  \"principal\": \"github_actions\",
                  \"payload\": {\"run_id\": \"${{ github.run_id }}\", \"status\": \"ok\"}
                }
              ]
            }" \
            && echo "Ingest: 2 entries written to production sigchain" \
            || echo "Ingest failed — sigchain not updated (non-blocking)"
