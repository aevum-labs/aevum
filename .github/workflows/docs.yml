name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs/requirements.txt"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and deploy documentation
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Install system dependencies for social cards
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libcairo2-dev libfreetype6-dev \
            libgdk-pixbuf2.0-dev libpango1.0-dev libffi-dev

      - name: Install documentation dependencies
        run: pip install -r docs/requirements.txt

      - name: Install aevum packages
        run: |
          pip install -e packages/aevum-core
          pip install -e packages/aevum-server
          pip install -e packages/aevum-mcp
          pip install -e packages/aevum-conformance
          pip install -e "packages/aevum-cli[conform]"

      - name: Build documentation
        run: mkdocs build --strict

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

      - name: Ingest docs.published to production sigchain
        if: success()
        continue-on-error: true
        env:
          MAINTENANCE_INGEST_TOKEN: ${{ secrets.MAINTENANCE_INGEST_TOKEN }}
          DEMO_API_URL: https://demo.aevum.build
        run: |
          if [ -z "$MAINTENANCE_INGEST_TOKEN" ]; then
            echo "MAINTENANCE_INGEST_TOKEN not set — skipping ingest"
            exit 0
          fi

          RUN_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"

          curl -sf \
            -X POST "${DEMO_API_URL}/v1/maintenance/ingest" \
            -H "Authorization: Bearer ${MAINTENANCE_INGEST_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"session_id\": \"docs-${{ github.run_id }}\",
              \"entries\": [
                {
                  \"action\":    \"docs.published\",
                  \"resource\":  \"aevum.build\",
                  \"principal\": \"github_actions\",
                  \"payload\": {
                    \"run_id\":  \"${{ github.run_id }}\",
                    \"commit\":  \"${SHORT_SHA}\",
                    \"ref\":     \"${{ github.ref_name }}\",
                    \"summary\": \"Documentation published at commit ${SHORT_SHA}\"
                  }
                }
              ]
            }" \
            && echo "✅ docs.published ingested to production sigchain" \
            || echo "⚠️  Ingest failed (non-blocking)"
