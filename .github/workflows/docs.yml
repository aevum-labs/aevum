name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs/requirements.txt"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Build and deploy documentation
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.11"

      - name: Install system dependencies for social cards
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libcairo2-dev libfreetype6-dev \
            libgdk-pixbuf2.0-dev libpango1.0-dev libffi-dev

      - name: Install documentation dependencies
        run: pip install -r docs/requirements.txt

      - name: Install aevum packages
        run: |
          pip install -e packages/aevum-core
          pip install -e packages/aevum-server
          pip install -e packages/aevum-mcp
          pip install -e packages/aevum-conformance
          pip install -e "packages/aevum-cli[conform]"

      - name: Build documentation
        run: mkdocs build --strict

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d  # v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
