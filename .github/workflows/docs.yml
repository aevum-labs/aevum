name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs/requirements.txt"

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install documentation dependencies
        run: pip install -r docs/requirements.txt

      - name: Install aevum packages
        run: |
          pip install -e packages/aevum-core
          pip install -e packages/aevum-server
          pip install -e packages/aevum-sdk
          pip install -e packages/aevum-mcp
          pip install -e packages/aevum-cli

      - name: Configure git for deploy
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build (strict mode catches broken links)
        run: mkdocs build --strict

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force --remote-name origin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
