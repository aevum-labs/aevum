name: Framework Release Digest

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly, Monday 09:00 UTC (same as dependency-monitor)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  digest:
    name: Collect release digest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch release digests
        run: python3 scripts/framework_digest.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
