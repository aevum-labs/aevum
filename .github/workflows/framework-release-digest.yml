name: Framework Release Digest

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly, Monday 09:00 UTC (same as dependency-monitor)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  digest:
    name: Collect release digest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Fetch release digests
        run: python3 scripts/framework_digest.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
