name: Policy Adapter Matrix

on:
  push:
    branches: [main]
    paths:
      - "packages/aevum-core/**"
  pull_request:
    paths:
      - "packages/aevum-core/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  adapter-matrix:
    name: "aevum-core / ${{ matrix.install-extra }} / py${{ matrix.python }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
        install-extra:
          - "no-cedar"         # NullPolicyEngine path
          - "with-cedar"       # CedarPolicyEngine path
          - "openai-agents"    # openai-agents adapter snapshot tests
          - "langgraph"        # LangGraph AevumCheckpointer snapshot tests
          - "crewai"           # CrewAI AevumCrewHooks snapshot tests
          - "anthropic"        # Anthropic SDK AevumAnthropicAdapter snapshot tests
          - "langchain"        # LangChain AevumLangChainCallback snapshot tests
          - "adk"              # Google ADK AevumADKPlugin snapshot tests
          - "maf"              # Microsoft Agent Framework AevumMAFAdapter snapshot tests

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Build liboqs C library (required by liboqs-python)
        run: |
          pip install cmake ninja
          curl -fsSL https://github.com/open-quantum-safe/liboqs/archive/refs/tags/0.14.0.tar.gz | tar xz
          cmake -GNinja \
            -DCMAKE_INSTALL_PREFIX="$HOME/_oqs" \
            -DBUILD_SHARED_LIBS=ON \
            -DOQS_USE_OPENSSL=OFF \
            -S liboqs-0.14.0 -B liboqs-build
          ninja -C liboqs-build -j$(nproc) install
          rm -rf liboqs-0.14.0 liboqs-build

      - name: Install workspace (no Cedar)
        if: matrix.install-extra == 'no-cedar'
        run: uv sync --frozen --python ${{ matrix.python }}

      - name: Install workspace (with Cedar)
        if: matrix.install-extra == 'with-cedar'
        run: |
          uv sync --frozen --python ${{ matrix.python }}
          uv pip install --python ${{ matrix.python }} "cedarpy>=4.8.1"

      - name: Install workspace (openai-agents)
        if: matrix.install-extra == 'openai-agents'
        run: |
          uv sync --frozen --python ${{ matrix.python }}
          uv pip install --python ${{ matrix.python }} "openai-agents>=0.0.12,<1.0"

      - name: Install workspace (langgraph)
        if: matrix.install-extra == 'langgraph'
        run: |
          uv sync --frozen --python ${{ matrix.python }}
          uv pip install --python ${{ matrix.python }} "langgraph-checkpoint>=4.1.0"

      - name: Install workspace (crewai)
        if: matrix.install-extra == 'crewai'
        run: |
          uv sync --frozen --python ${{ matrix.python }}
          uv pip install --python ${{ matrix.python }} "crewai>=0.80.0"

      - name: Install workspace (anthropic)
        if: matrix.install-extra == 'anthropic'
        run: |
          uv sync --frozen --python ${{ matrix.python }}
          uv pip install --python ${{ matrix.python }} "anthropic>=0.50.0"

      - name: Install workspace (langchain)
        if: matrix.install-extra == 'langchain'
        run: |
          uv sync --frozen --python ${{ matrix.python }}
          uv pip install --python ${{ matrix.python }} "langchain-core>=0.2.0"

      - name: Install workspace (adk)
        if: matrix.install-extra == 'adk'
        run: |
          uv sync --frozen --python ${{ matrix.python }}
          uv pip install --python ${{ matrix.python }} "google-adk>=2.2,<3"

      - name: Run policy protocol tests
        if: "!contains(fromJSON('[\"openai-agents\",\"langgraph\",\"crewai\",\"anthropic\",\"langchain\",\"adk\",\"maf\"]'), matrix.install-extra)"
        run: uv run --python ${{ matrix.python }} pytest packages/aevum-core/tests/test_policy_protocol.py -v

      - name: Run aevum-core test suite
        if: "!contains(fromJSON('[\"openai-agents\",\"langgraph\",\"crewai\",\"anthropic\",\"langchain\",\"adk\",\"maf\"]'), matrix.install-extra)"
        run: uv run --python ${{ matrix.python }} pytest packages/aevum-core/tests/ -v -m "not integration" --inline-snapshot=disable

      - name: Run openai-agents adapter snapshot tests
        if: matrix.install-extra == 'openai-agents'
        run: uv run --python ${{ matrix.python }} pytest packages/aevum-core/tests/adapters/test_openai_agents_adapter.py -v --inline-snapshot=disable

      - name: Run langgraph adapter snapshot tests
        if: matrix.install-extra == 'langgraph'
        run: uv run --python ${{ matrix.python }} pytest packages/aevum-core/tests/adapters/test_langgraph_adapter.py -v --inline-snapshot=disable

      - name: Run crewai adapter snapshot tests
        if: matrix.install-extra == 'crewai'
        run: uv run --python ${{ matrix.python }} pytest packages/aevum-core/tests/adapters/test_crewai_adapter.py -v --inline-snapshot=disable

      - name: Run anthropic adapter snapshot tests
        if: matrix.install-extra == 'anthropic'
        run: uv run --python ${{ matrix.python }} pytest packages/aevum-core/tests/adapters/test_anthropic_adapter.py -v --inline-snapshot=disable

      - name: Run langchain adapter snapshot tests
        if: matrix.install-extra == 'langchain'
        run: uv run --python ${{ matrix.python }} pytest packages/aevum-core/tests/adapters/test_langchain_callback.py -v --inline-snapshot=disable

      - name: Run ADK adapter snapshot tests
        if: matrix.install-extra == 'adk'
        run: uv run --python ${{ matrix.python }} pytest packages/aevum-core/tests/adapters/test_adk_adapter.py -v --inline-snapshot=disable

      - name: Install workspace (maf)
        if: matrix.install-extra == 'maf'
        run: |
          uv sync --frozen --python ${{ matrix.python }}
          uv pip install --python ${{ matrix.python }} "agent-framework-core>=1.0.0"

      - name: Run MAF adapter snapshot tests
        if: matrix.install-extra == 'maf'
        run: uv run --python ${{ matrix.python }} pytest packages/aevum-core/tests/adapters/test_maf_adapter.py -v --inline-snapshot=disable
