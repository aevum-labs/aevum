# .github/dependabot.yml
# Dependabot watches for new dependency versions and opens PRs automatically.
# Complements pip-audit (which catches CVEs) by also catching non-security updates.
# PRs that pass CI can be auto-merged via the auto-merge.yml workflow.

version: 2
updates:
  # Python dependencies (pyproject.toml + uv.lock) — native uv ecosystem.
  # MUST be "uv", not "pip": the pip ecosystem does not read/update uv.lock,
  # so frozen-in-lock vulnerable versions go unseen (root cause of the
  # starlette/python-multipart/cryptography CVEs cleared in HO-SEC-1/2/3).
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      # Group patch updates together — one PR for all patches
      patch-updates:
        update-types:
          - patch
    ignore:
      # Hold major bumps for manual review
      - dependency-name: pydantic
        update-types: [version-update:semver-major]

  # GitHub Actions — keep CI tooling current
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
