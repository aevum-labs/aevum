# .github/dependabot.yml
# GitHub Actions are kept current by Dependabot below.
# Python deps are NOT handled by Dependabot: its uv updater fails on this
# multi-member uv workspace (run /1419382975 — 30 min / 5,140 calls / update_files error).
# Python security relocks are handled by .github/workflows/dependency-refresh.yml,
# with .github/workflows/security.yml (weekly pip-audit) as the detection backstop.

version: 2
updates:
  # GitHub Actions — keep CI tooling current (this ecosystem works fine)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  # Docker base images — FROM lines are digest-pinned; Dependabot bumps the
  # digest (keeping the tag) so pinned images still receive upstream patches.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
