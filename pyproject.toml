# Aevum monorepo — uv virtual workspace root
# This file is a workspace coordinator only — it has no project section.
# Individual packages live under packages/ with their own pyproject.toml.

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "hypothesis>=6.100",
    "mypy>=1.10",
    "ruff>=0.9",
    "rich>=13.0",
    "types-PyYAML>=6.0",
    "bandit>=1.7",
    "pip-audit>=2.6",
]
# CVE GHSA-pp6c-gr5w-3c5g: python-multipart DoS fixed in 0.0.27 (transitive via mcp)
constraint-dependencies = [
    "python-multipart>=0.0.27",
]

[tool.pytest.ini_options]
testpaths = ["packages", "tests"]
asyncio_mode = "auto"
addopts = "--tb=short -m 'not integration'"
markers = [
    "integration: live network tests (run with: pytest -m integration)",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I", "TCH", "ANN"]
ignore = ["ANN401"]

[tool.ruff.lint.per-file-ignores]
"demo/main.py" = ["E501"]  # long lines acceptable in embedded HTML template strings

[tool.mypy]
strict = true
python_version = "3.11"

[[tool.mypy.overrides]]
module = "oqs"
ignore_missing_imports = true
ignore_errors = true

[[tool.mypy.overrides]]
module = "langgraph.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "langgraph.checkpoint.*"
ignore_missing_imports = true
